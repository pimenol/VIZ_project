# ProteinTTT Benchmark Configuration
# Runs multiple seeds and computes per-step LDDT for aggregated plots.

# Data settings
df_path: "/scratch/project/open-35-8/pimenol1/ProteinTTT/ProteinTTT_fresh/data/viz"
max_sequence_length: 500
use_true_pdb: true
use_chain_name: false
renumber_pdb: false

# Test-Time Training settings
msa: true
generate_msa: false
describe_structure: true
msa_sampling_strategy: "neighbors"
gradient_clip: true
gradient_clip_max_norm: 1.5
compute_step_metrics: true 
confidence_collapse_ratio: 0.7
confidence_collapse_patience: 3
steps: 20
lr: 0.04
lora_rank: 64
lora_alpha: 128
ags: 64
mask_ratio: 0.2

seed: 0  
num_seeds: 1

input:
  summary_file: "summary.csv"
  pdb_dir: "/scratch/project/open-35-8/antonb/bfvd/bfvd"
  msa_dir: "/scratch/project/open-35-8/antonb/bfvd/bfvd_msa"

columns:
  id_column: "id"
  sequence_column: "sequence"
  chain_id_column: "chain_id"
